<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title th:text="${review.author.nickname} + '님의 리뷰'">리뷰 상세</title>
    <link rel="stylesheet" href="/css/detail.css">
    <link rel="stylesheet" href="/css/review.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="detail-container review-detail-page">

    <a th:href="@{|/content/${review.content.id}|}" class="back-btn">
        <i class="fa-solid fa-chevron-left"></i>
        뒤로가기
    </a>

    <div class="review-detail-card">
        <div class="review-header">
            <div class="profile"></div>
            <div class="review-user">
                <span class="nickname" th:text="${review.author.nickname}"></span>
                <span class="score" th:text="'★ ' + ${review.rating}"></span>
                <span class="time"
                      th:text="${#temporals.format(review.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
            </div>
        </div>

        <p class="short-review-line" th:if="${review.shortReview}" th:text="${review.shortReview}"></p>
        <p class="review-text" th:text="${review.reviewText}"></p>

        <div class="review-bottom" sec:authorize="isAuthenticated()"
             th:if="${#authentication.name == review.author.loginId}">
            <a th:href="@{|/review/modify/${review.id}|}">수정</a>
            <a th:href="@{|/review/delete/${review.id}|}">삭제</a>
        </div>
    </div>

    <!-- 댓글 -->
    <section class="comments-section">
        <h2>
            댓글
            <span class="comment-count-badge">
                <i class="fa-regular fa-comment"></i>
                <span th:text="${commentCount}">0</span>
            </span>
        </h2>

        <p class="auth-error" th:if="${param.commentError}">댓글을 입력해 주세요.</p>

        <div class="comment-list">
            <div class="comment-item" th:each="comment : ${comments}">
                <div class="comment-header">
                    <span class="nickname" th:text="${comment.author.nickname}"></span>
                    <span class="time"
                          th:text="${#temporals.format(comment.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
                </div>
                <p class="comment-text" th:text="${comment.content}"></p>
                <a th:href="@{|/review/comment/delete/${comment.id}|}"
                   sec:authorize="isAuthenticated()"
                   th:if="${#authentication.name == comment.author.loginId}"
                   class="comment-delete">삭제</a>
            </div>
            <p th:if="${#lists.isEmpty(comments)}" class="empty-review">아직 댓글이 없습니다.</p>
        </div>

        <form th:action="@{|/review/${review.id}/comment|}"
              method="post"
              th:object="${commentForm}"
              class="comment-form"
              sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <textarea th:field="*{content}" placeholder="댓글을 입력해주세요." rows="3"></textarea>
            <button type="submit">댓글 등록</button>
        </form>

        <p sec:authorize="isAnonymous()" class="login-hint">
            <a href="/user/signin">로그인</a> 후 댓글을 남길 수 있습니다.
        </p>
    </section>

</div>
</body>
</html>
