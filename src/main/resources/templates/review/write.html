<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>리뷰 작성 - CineBook</title>
    <link rel="stylesheet" href="/css/review.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="review-write-page">

	<a th:href="@{|/content/${selectedContent.id}|}"
	   class="btn-back">
	    ←
	</a>

    <h1 class="page-title">리뷰 작성</h1>

    <!-- 탭: 영화 / 책 -->
    <div class="tabs" th:if="${reviewId == null}">
        <a th:href="@{/review/write(searchType='MOVIE', keyword=${keyword}, contentId=${selectedContent != null ? selectedContent.id : null})}"
           th:class="'tab' + (${searchType.name() == 'MOVIE'} ? ' active' : '')">영화 검색</a>
        <a th:href="@{/review/write(searchType='BOOK', keyword=${keyword}, contentId=${selectedContent != null ? selectedContent.id : null})}"
           th:class="'tab' + (${searchType.name() == 'BOOK'} ? ' active' : '')">책 검색</a>
    </div>
    

    <!-- 검색 (수정 모드가 아닐 때) -->
    <div class="search-block" th:if="${reviewId == null}">
        <form th:action="@{/review/write}" method="get" class="search-form">
            <input type="hidden" name="searchType" th:value="${searchType}">
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   th:placeholder="${searchType.name() == 'BOOK'} ? '책 제목, 저자 검색' : '영화 제목, 감독 검색'"
                   class="search-input">
            <button type="submit" class="search-btn" aria-label="검색">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>

        <p class="auth-error" th:if="${apiError}" th:text="${apiError}"></p>

        <!-- 책 API 검색 결과 -->
        <div class="search-results" th:if="${searchType.name() == 'BOOK' and apiBooks != null and !apiBooks.isEmpty()}">
            <div class="search-result-item" th:each="book : ${apiBooks}">
                <img th:src="${book.imageUrl}" th:alt="${book.title}"
                     onerror="this.src='https://via.placeholder.com/48x64?text=Book'">
                <div class="result-info">
                    <strong th:text="${book.title}"></strong>
                    <span th:text="${book.creator}"></span>
                </div>
                <form th:action="@{/review/write/select-book}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="isbn" th:value="${book.isbn}">
                    <input type="hidden" name="title" th:value="${book.title}">
                    <input type="hidden" name="creator" th:value="${book.creator}">
                    <input type="hidden" name="imageUrl" th:value="${book.imageUrl}">
                    <button type="submit" class="select-btn">선택</button>
                </form>
            </div>
        </div>

        <!-- 영화 DB 검색 결과 -->
        <!-- <div class="search-results" th:if="${searchType.name() == 'MOVIE' and movieResults != null and !movieResults.isEmpty()}">
            <div class="search-result-item" th:each="movie : ${movieResults}">
                <img th:src="${movie.imageUrl}" th:alt="${movie.title}"
                     onerror="this.src='https://via.placeholder.com/48x64?text=Movie'">
                <div class="result-info">
                    <strong th:text="${movie.title}"></strong>
                    <span th:text="${movie.creator}"></span>
                </div>
                <a th:href="@{/review/write(searchType='MOVIE', contentId=${movie.id})}"
                   class="select-btn">선택</a>
            </div>
        </div> -->
        <!-- 영화 API 검색 결과 -->
		<div class="search-results"
		     th:if="${searchType.name() == 'MOVIE'
		             and apiMovies != null
		             and !apiMovies.isEmpty()}">
		
		    <div class="search-result-item"
		         th:each="movie : ${apiMovies}">
		
		        <img th:src="${movie.imageUrl}"
		             th:alt="${movie.title}"
		             onerror="this.src='https://via.placeholder.com/48x64?text=Movie'">
		
		        <div class="result-info">
		            <strong th:text="${movie.title}"></strong>
		            <span th:text="${movie.creator}"></span>
		        </div>
		
		        <!-- 선택 버튼 -->
		        <button type="button" class="select-btn">
		            선택
		        </button>
		
		    </div>
		</div>
    </div>

    <!-- 선택된 콘텐츠 -->
    <div class="selected-content" th:if="${selectedContent != null}">
        <img th:src="${selectedContent.imageUrl}" th:alt="${selectedContent.title}">
        <div>
            <strong th:text="${selectedContent.title}"></strong>
            <span th:text="${selectedContent.creator}"></span>
        </div>
    </div>

    <p class="select-hint" th:if="${selectedContent == null and reviewId == null}">
        검색 후 리뷰할 작품을 선택해 주세요.
    </p>

    <!-- 리뷰 폼 -->
    <form th:if="${selectedContent != null}"
          th:action="${reviewId != null} ? @{'/review/modify/' + ${reviewId}} : @{/review/create}"
          method="post"
          th:object="${reviewForm}"
          class="review-form">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="contentId" th:value="${selectedContent.id}" th:if="${reviewId == null}">

        <div th:replace="~{form_errors :: formErrorsFragment}"></div>

        <!-- 별점 -->
        <div class="form-group">
            <label>별점</label>
            <div class="star-rating" id="starRating">
                <i class="fa-regular fa-star" data-value="1"></i>
                <i class="fa-regular fa-star" data-value="2"></i>
                <i class="fa-regular fa-star" data-value="3"></i>
                <i class="fa-regular fa-star" data-value="4"></i>
                <i class="fa-regular fa-star" data-value="5"></i>
            </div>
            <input type="hidden" th:field="*{rating}" id="ratingInput"
                   th:value="${reviewForm.rating != null ? reviewForm.rating : 0}">
        </div>

        <!-- 한줄 평 -->
        <div class="form-group">
            <label for="shortReview">한줄 평</label>
            <input type="text"
                   id="shortReview"
                   th:field="*{shortReview}"
                   placeholder="한줄 감상을 입력해주세요."
                   class="text-input">
        </div>

        <!-- 감상문 -->
        <div class="form-group">
            <label for="reviewText">감상문</label>
            <textarea id="reviewText"
                      th:field="*{reviewText}"
                      placeholder="감상을 자유롭게 작성해주세요."
                      class="textarea-input"></textarea>
        </div>

        <div class="form-actions">
            <a th:href="@{|/content/${selectedContent.id}|}" class="btn-cancel">취소</a>
            <button type="submit" class="btn-submit">등록하기</button>
        </div>
    </form>

</div>

<script th:inline="javascript">
    (function () {
        const stars = document.querySelectorAll('#starRating i');
        const input = document.getElementById('ratingInput');
        if (!stars.length || !input) return;

        let current = parseFloat(input.value) || 0;

        function render(val) {
            stars.forEach(s => {
                const v = parseInt(s.dataset.value);
                s.classList.toggle('fa-solid', v <= val);
                s.classList.toggle('fa-regular', v > val);
            });
        }

        render(current);

        stars.forEach(star => {
            star.addEventListener('click', () => {
                current = parseInt(star.dataset.value);
                input.value = current;
                render(current);
            });
        });
    })();
</script>

</body>
</html>
