<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>로그인 - CineBook</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="auth-page">
    <h1>CineBook 로그인</h1>

    <div class="auth-error" th:if="${param.error}">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <div class="auth-success" th:if="${param.logout}">
        로그아웃되었습니다.
    </div>

    <div class="auth-success" th:if="${signupSuccess}">
        회원가입이 완료되었습니다. 로그인해 주세요.
    </div>

    <form th:action="@{/user/signin}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="text" name="username" placeholder="아이디" required autofocus>
        <input type="password" name="password" placeholder="비밀번호" required>
        <button type="submit">로그인</button>
    </form>

    <p>계정이 없으신가요? <a href="/user/signup">회원가입</a></p>
</main>

</body>
</html>
