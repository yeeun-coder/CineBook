<div th:fragment="formErrorsFragment" class="form-errors" xmlns:th="http://www.thymeleaf.org"
     th:if="${#fields.hasAnyErrors()}">
    <div th:each="err : ${#fields.allErrors()}" th:text="${err}"></div>
</div>

<div th:fragment="globalErrorsFragment" class="form-errors" xmlns:th="http://www.thymeleaf.org"
     th:if="${#fields.hasGlobalErrors()}">
    <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
</div>
