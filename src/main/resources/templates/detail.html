<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title th:text="${content.title} + ' - CineBook'">상세페이지</title>
    <link rel="stylesheet" href="/css/detail.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="detail-container">

    <a th:href="${content.type.name() == 'MOVIE'} ? '/movie' : '/book'" class="back-btn">
        <i class="fa-solid fa-chevron-left"></i>
        뒤로가기
    </a>

    <div class="top-section">

        <img class="poster" th:src="${content.imageUrl}" th:alt="${content.title}">

        <div class="content-info">

            <div th:class="'category ' + (${content.type.name() == 'MOVIE'} ? 'movie' : 'book')"
                 th:text="${content.type.name() == 'MOVIE'} ? '영화' : '책'">
            </div>

            <h1 th:text="${content.title}"></h1>

            <p class="creator"
               th:text="(${content.type.name() == 'MOVIE'} ? '감독 ' : '저자 ') + ${content.creator}">
            </p>

            <div class="rating">
                <i class="fa-solid fa-star"></i>
                <span th:text="${#numbers.formatDecimal(averageRating, 1, 1)}">0.0</span>
            </div>

            <div class="sub-info">
                <span>
                    <i class="fa-regular fa-comment"></i>
                    <span th:text="${reviewCount}">0</span>
                </span>
            </div>

            <a th:href="@{/review/write(contentId=${content.id}, searchType=${content.type})}"
               class="review-btn"
               sec:authorize="isAuthenticated()">
                리뷰 작성하기
            </a>
            <a href="/user/signin" class="review-btn" sec:authorize="isAnonymous()">
                로그인 후 리뷰 작성
            </a>

        </div>
    </div>

    <div class="review-list">

        <a th:each="review : ${reviews}"
           th:href="@{|/review/${review.id}|}"
           class="review-card review-card-link">

            <div class="review-header">
                <div class="profile"></div>
                <div class="review-user">
                    <span class="nickname" th:text="${review.author.nickname}"></span>
                    <span class="score" th:text="'★ ' + ${review.rating}"></span>
                    <span class="time"
                          th:text="${#temporals.format(review.createdAt, 'yyyy.MM.dd HH:mm')}">
                    </span>
                </div>
            </div>

            <p class="short-review-line" th:if="${review.shortReview}" th:text="${review.shortReview}"></p>
            <p class="review-text" th:text="${#strings.abbreviate(review.reviewText, 120)}"></p>

            <div class="review-bottom">
                <span class="comment-stat">
                    <i class="fa-regular fa-comment"></i>
                    <span th:text="${commentCounts[review.id]}">0</span>
                </span>
            </div>

        </a>

        <p th:if="${#lists.isEmpty(reviews)}" class="empty-review">아직 리뷰가 없습니다.</p>

    </div>

</div>
</body>
</html>
