<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>CineBook - 영화</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header th:replace="~{fragments/header :: header('movie', ${type}, ${kw})}"></header>

<main>

    <div class="title-area">
    	<div class="title-left">
            <h1 th:text="${kw != null and !kw.isBlank()} ? '영화 검색 결과' : '전체 영'">전체 영화</h1>
            <p th:if="${kw == null or kw.isBlank()}"
               th:text="'총 ' + ${paging.totalElements} + '편의 영화가 있습니다.'"></p>
            <p th:if="${kw != null and !kw.isBlank()}"
               th:text="'「' + ${kw} + '」 검색 · 내 서재 ' + ${paging.totalElements} + '편'"></p>
        </div>
        <!-- <div class="title-left">
            <h1>전체 영화</h1>
            <p th:text="'총 ' + ${paging.totalElements} + '편의 영화가 있습니다.'"></p>
        </div> -->

        <div class="title-right">
            <a href="/my-movie" class="library-btn">
                내 서재 보기
            </a>
        </div>
    </div>
    
    <div class="auth-error" th:if="${apiError}" th:text="${apiError}"></div>
    <div class="auth-error" th:if="${importError}" th:text="${importError}"></div>
    
    <!-- KMDB API 검색 결과 -->
    <section th:if="${kw != null and !kw.isBlank()}" class="search-section">
        <h2 class="section-title">KMDB 영화 검색</h2>
        <p class="section-desc">영화를 선택하면 내 서재에 추가되고 리뷰를 작성할 수 있습니다.</p>

        <div class="content" th:if="${apiMovies != null and !apiMovies.isEmpty()}">
            <div th:each="movie : ${apiMovies}" class="card card-api">
                <div class="category book">검색</div>
                <img th:src="${movie.imageUrl}" th:alt="${movie.title}"
                     onerror="this.src='https://via.placeholder.com/200x280?text=No+Cover'">
                <h3 th:text="${movie.title}"></h3>
                <p class="author" th:text="${movie.creator}"></p>
                <!-- <p class="publisher" th:if="${movie.publisher}" th:text="${movie.publisher}"></p> -->

                <form th:action="@{/content/movie/import}" method="post" class="import-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="title" th:value="${movie.title}">
                    <input type="hidden" name="creator" th:value="${movie.creator}">
                    <input type="hidden" name="imageUrl" th:value="${movie.imageUrl}">
                    <button type="submit" class="import-btn">리뷰 작성하기</button>
                </form>
            </div>
        </div>

        <p class="empty-review" th:if="${apiMovies == null or apiMovies.isEmpty()}">
            검색 결과가 없습니다. 다른 키워드로 검색해 보세요.
        </p>
    </section>
	
	<!-- 내 서재 (DB에 저장된 영) -->
    <section class="content">
        <a th:each="card : ${cards}"
           th:href="@{|/content/${card.content.id}|}"
           class="card-link">
            <div class="card">
                <div class="category movie">영화</div>
                <img th:src="${card.content.imageUrl}" th:alt="${card.content.title}">
                <h3 th:text="${card.content.title}"></h3>
                <p class="author" th:text="${card.content.creator}"></p>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <span th:text="${#numbers.formatDecimal(card.averageRating, 1, 1)}">0.0</span>
                </div>
                <div class="info">
                    <span>
                        <i class="fa-regular fa-comment"></i>
                        <span th:text="${card.reviewCount}">0</span>
                    </span>
                </div>
            </div>
        </a>
    </section>

    <div class="pagination" th:if="${paging.totalPages > 0}">
        <a th:each="pageNum : ${#numbers.sequence(0, paging.totalPages - 1)}"
           th:href="@{/movie(page=${pageNum}, kw=${kw})}"
           th:text="${pageNum + 1}"
           th:class="'page' + (${pageNum} == ${paging.number} ? ' active' : '')">
        </a>
    </div>

</main>
</body>
</html>
